name: contractguard

services:
  app:
    build:
      context: .
    image: contractguard:local
    ports:
      - "${PORT:-8010}:8000"
    environment:
      APP_MODE: ${APP_MODE:-offline}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-luna}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/contractguard.db}
      LIGHTRAG_BASE_URL: ${LIGHTRAG_BASE_URL:-}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CONTRACT_GUARD_ENV: ${CONTRACT_GUARD_ENV:-development}
      CONTRACT_GUARD_DOCS_ENABLED: ${CONTRACT_GUARD_DOCS_ENABLED:-true}
      CONTRACT_GUARD_CORS_ORIGINS: ${CONTRACT_GUARD_CORS_ORIGINS:-}
      CONTRACT_GUARD_AUTH_REQUIRED: ${CONTRACT_GUARD_AUTH_REQUIRED:-true}
      CONTRACT_GUARD_REGISTRATION_ENABLED: ${CONTRACT_GUARD_REGISTRATION_ENABLED:-true}
      CONTRACT_GUARD_AUTH_ACCESS_TTL_MINUTES: ${CONTRACT_GUARD_AUTH_ACCESS_TTL_MINUTES:-480}
      CONTRACT_GUARD_AUTH_REFRESH_TTL_DAYS: ${CONTRACT_GUARD_AUTH_REFRESH_TTL_DAYS:-30}
      CONTRACT_GUARD_AUTH_COOKIE_SECURE: ${CONTRACT_GUARD_AUTH_COOKIE_SECURE:-false}
      CONTRACT_GUARD_LOGIN_ATTEMPT_LIMIT: ${CONTRACT_GUARD_LOGIN_ATTEMPT_LIMIT:-10}
      CONTRACT_GUARD_LOGIN_WINDOW_SECONDS: ${CONTRACT_GUARD_LOGIN_WINDOW_SECONDS:-300}
      CONTRACT_GUARD_MAX_UPLOAD_BYTES: ${CONTRACT_GUARD_MAX_UPLOAD_BYTES:-20971520}
      CONTRACT_GUARD_MAX_DOCUMENT_PAGES: ${CONTRACT_GUARD_MAX_DOCUMENT_PAGES:-200}
      CONTRACT_GUARD_MAX_DOCUMENT_CHARACTERS: ${CONTRACT_GUARD_MAX_DOCUMENT_CHARACTERS:-1000000}
      CONTRACT_GUARD_MAX_DOCX_UNCOMPRESSED_BYTES: ${CONTRACT_GUARD_MAX_DOCX_UNCOMPRESSED_BYTES:-104857600}
      CONTRACT_GUARD_MAX_OCR_PIXELS: ${CONTRACT_GUARD_MAX_OCR_PIXELS:-20000000}
    volumes:
      - contractguard-data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2)
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:3.9.2
    profiles: ["events"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data

  neo4j:
    image: neo4j:2026.06.0
    profiles: ["graph"]
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/change-me-before-use}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  mysql:
    image: mysql:8.4
    profiles: ["mysql"]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-contractguard}
      MYSQL_USER: ${MYSQL_USER:-contractguard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-before-use}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-before-use}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    profiles: ["vector"]
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - milvus-etcd:/etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    profiles: ["vector"]
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    command: minio server /minio_data
    volumes:
      - milvus-minio:/minio_data

  milvus:
    image: milvusdb/milvus:v2.5.27
    profiles: ["vector"]
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus

volumes:
  contractguard-data:
  redis-data:
  kafka-data:
  neo4j-data:
  mysql-data:
  milvus-etcd:
  milvus-minio:
  milvus-data:
